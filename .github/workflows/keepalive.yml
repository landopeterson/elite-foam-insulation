name: Supabase keep-alive

# Supabase free projects pause after ~7 days of inactivity, which would break the
# contact form. This pings the REST API twice a week to keep the project active.
# The key below is the PUBLISHABLE (anon) key — safe to expose; it's also in the
# site's front-end. It only permits INSERTs via RLS, so this read returns nothing.

on:
  schedule:
    - cron: "0 12 * * 1,4"   # Mondays and Thursdays at 12:00 UTC
  workflow_dispatch: {}       # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          KEY="sb_publishable_Sx0e9I__azKV40cqLycudw_nruWASEf"
          curl -sS -o /dev/null -w "Supabase ping -> HTTP %{http_code}\n" \
            "https://kvimcudxptpdnyemrrbk.supabase.co/rest/v1/leads?select=id&limit=1" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY"
